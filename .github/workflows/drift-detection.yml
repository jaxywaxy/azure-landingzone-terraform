name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 2 * * *"   # Daily at 2 AM UTC
  workflow_dispatch:

jobs:
  drift-detection:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Detect drift in all environments
        id: drift
        run: |
          set -e

          DRIFT_FOUND=0
          DRIFT_REPORT=""

          for env in envs/*; do
            if [ -d "$env" ]; then
              echo "🔍 Checking drift in environment: $(basename "$env")"
              cd "$env"

              terraform init -input=false -no-color

              set +e
              terraform plan -detailed-exitcode -no-color > plan.out
              exitcode=$?
              set -e

              if [ $exitcode -eq 0 ]; then
                echo "✔️ No drift detected in $(basename "$env")"
              elif [ $exitcode -eq 2 ]; then
                echo "❗ Drift detected in $(basename "$env")"
                DRIFT_FOUND=1

                DRIFT_REPORT+="### Drift detected in \`$(basename "$env")\`\n"
                DRIFT_REPORT+="\n\`\`\`diff\n$(cat plan.out)\n\`\`\`\n\n"
              else
                echo "❌ Error running plan in $(basename "$env")"
                DRIFT_FOUND=1

                DRIFT_REPORT+="### Error running plan in \`$(basename "$env")\`\n"
                DRIFT_REPORT+="\n\`\`\`\n$(cat plan.out)\n\`\`\`\n\n"
              fi

              cd - > /dev/null
            fi
          done

          echo "drift_found=$DRIFT_FOUND" >> $GITHUB_OUTPUT
          echo "drift_report<<EOF" >> $GITHUB_OUTPUT
          echo -e "$DRIFT_REPORT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create or update drift issue
        if: steps.drift.outputs.drift_found == '1'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "⚠️ Terraform Drift Detected"
          content-filepath: drift-report.md
          labels: drift, terraform, automated
          update-existing: true

      - name: Write drift report to file
        if: steps.drift.outputs.drift_found == '1'
        run: |
          echo -e "${{ steps.drift.outputs.drift_report }}" > drift-report.md
